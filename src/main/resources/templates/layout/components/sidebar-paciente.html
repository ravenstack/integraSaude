<style>
    .sidebar-link.active {
        background-color: var(--primary-fixed, #f0dbff);
        color: var(--primary, #7543a9);
        font-weight: 600;
    }
</style>

<script>
    // Ativar link do sidebar baseado na página atual
    function ativarSidebarLink() {
        const caminhoPagina = window.location.pathname;
        const links = document.querySelectorAll('.sidebar-link');

        links.forEach(link => {
            const href = link.getAttribute('href');
            if (caminhoPagina === href || caminhoPagina.includes(link.dataset.page)) {
                link.classList.add('active', 'bg-primary-fixed', 'text-primary');
                link.classList.remove('text-secondary');
            } else {
                link.classList.remove('active', 'bg-primary-fixed', 'text-primary');
            }
        });
    }

    document.addEventListener('DOMContentLoaded', ativarSidebarLink);
</script>
