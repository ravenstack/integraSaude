<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>IntegraSaude - Cadastro Profissional</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="config/tailwind.config.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Outfit', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cec3d3; border-radius: 9999px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #925fc7; }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-4 md:p-6 relative">

<a href="/cadastro-escolha" class="absolute top-6 left-6 md:top-8 md:left-8 flex items-center gap-2 text-primary font-bold hover:text-amethyst transition-colors">
    <span class="material-symbols-outlined">arrow_back</span> Voltar
</a>

<div class="w-full max-w-5xl bg-surface rounded-xl shadow-[0px_12px_32px_rgba(0,0,0,0.08)] overflow-hidden flex flex-col md:flex-row h-[720px] border border-outline-variant mt-12 md:mt-0">

    <div class="hidden md:block w-2/5 relative">
        <img class="absolute inset-0 w-full h-full object-cover"
             src="https://images.pexels.com/photos/5452201/pexels-photo-5452201.jpeg" alt="Equipe Multidisciplinar">
        <div class="absolute inset-0 bg-primary/70 flex items-center justify-center p-12 text-white text-center">
            <div class="space-y-4">
                <span class="material-symbols-outlined text-[48px] opacity-80 text-white">diversity_3</span>
                <h2 class="text-2xl font-bold italic leading-relaxed">"A união de especialidades para um cuidado humano e completo."</h2>
            </div>
        </div>
    </div>

    <div class="flex-1 flex flex-col h-full bg-surface">

        <div class="p-8 pb-4 md:px-12 md:pt-10 border-b border-outline-variant/50">
            <div class="flex items-center gap-3 mb-2">
                <div class="bg-amethyst w-12 h-12 rounded-xl flex items-center justify-center text-white shadow-sm">
                    <span class="material-symbols-outlined text-[24px]">medical_services</span>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-primary tracking-tight">Registro Profissional</h1>
                    <p class="text-sm text-secondary">Saúde Integrada & Multidisciplinar</p>
                </div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto px-8 md:px-12 py-6 custom-scrollbar">

            <div id="success-banner" class="hidden mb-6 p-4 bg-success-container border border-success/20 rounded-md flex items-start gap-3">
                <span class="material-symbols-outlined text-success">check_circle</span>
                <div>
                    <p class="text-on-success-container font-bold text-sm">Cadastro concluído!</p>
                    <p class="text-on-success-container text-xs mt-1">Bem-vindo(a) à rede IntegraSaude. Redirecionando para o login...</p>
                </div>
            </div>

            <div id="error-banner" class="hidden mb-6 p-4 bg-error-container border border-error/20 rounded-md flex items-start gap-3">
                <span class="material-symbols-outlined text-error">error</span>
                <div>
                    <p class="text-on-error-container font-bold text-sm">Falha no registro</p>
                    <p id="error-message" class="text-on-error-container text-xs mt-1"></p>
                </div>
            </div>

            <form id="formCadastroProfissional" class="space-y-6">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="md:col-span-2 space-y-1.5">
                        <label class="text-[11px] font-bold text-secondary uppercase tracking-wider ml-1">Tipo de Profissional</label>
                        <select id="tipoProfissional" onchange="atualizarLabelRegistro()" class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none cursor-pointer" required>
                            <option value="" disabled selected>O que você faz?</option>
                            <option value="psicologo">Psicólogo(a)</option>
                            <option value="nutricionista">Nutricionista</option>
                            <option value="psiquiatra">Psiquiatra (Médico)</option>
                            <option value="fisioterapeuta">Fisioterapeuta</option>
                            <option value="fonoaudiologo">Fonoaudiólogo(a)</option>
                            <option value="outro">Outro Especialista</option>
                        </select>
                    </div>

                    <div class="md:col-span-2 space-y-1.5">
                        <label class="text-[11px] font-bold text-secondary uppercase tracking-wider ml-1">Nome Completo</label>
                        <input id="nome" type="text" placeholder="Como quer ser chamado?" class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none" required>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-[11px] font-bold text-secondary uppercase tracking-wider ml-1">CPF</label>
                        <input id="cpf" type="text" placeholder="000.000.000-00" class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none" required>
                    </div>

                    <div class="space-y-1.5">
                        <label id="labelRegistro" class="text-[11px] font-bold text-secondary uppercase tracking-wider ml-1">Nº Registro (CRP/CRM/...)</label>
                        <input id="registro" type="text" placeholder="00/00000" minlength="5" class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none" required>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-[11px] font-bold text-secondary uppercase tracking-wider ml-1">Cidade do Registro (UF)</label>
                        <input id="cidadeRegistro" type="text" placeholder="Ex: São Paulo - SP" class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none" required>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-[11px] font-bold text-secondary uppercase tracking-wider ml-1">Valor Sessão (R$)</label>
                        <input id="valor" type="number" step="0.01" placeholder="0,00" class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none" required>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-[11px] font-bold text-secondary uppercase tracking-wider ml-1">Especialidade Principal</label>
                        <input id="especialidade" type="text" placeholder="Ex: Terapia Cognitiva" class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none" required>
                    </div>

                    <div class="md:col-span-2 space-y-1.5">
                        <label class="text-[11px] font-bold text-secondary uppercase tracking-wider ml-1">E-mail de Trabalho</label>
                        <input id="email" type="email" placeholder="nome@profissional.com" class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none" required>
                    </div>

                    <div class="md:col-span-2 space-y-1.5 pb-2">
                        <label class="text-[11px] font-bold text-secondary uppercase tracking-wider ml-1">Crie uma Senha Forte</label>
                        <input id="password" type="password" placeholder="••••••••" minlength="6" class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none" required>
                    </div>
                </div>

                <div class="pt-4 border-t border-outline-variant/30">
                    <button type="submit" class="w-full bg-amethyst text-white font-bold py-4 rounded-full shadow-md hover:bg-primary active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-[20px]">how_to_reg</span> Concluir Registro
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function atualizarLabelRegistro() {
        const tipo = document.getElementById('tipoProfissional').value;
        const label = document.getElementById('labelRegistro');
        const labels = {
            'psicologo': 'Nº Registro (CRP)',
            'nutricionista': 'Nº Registro (CRN)',
            'psiquiatra': 'Nº Registro (CRM)',
            'fisioterapeuta': 'Nº Registro (CREFITO)',
            'fonoaudiologo': 'Nº Registro (CRFa)',
            'outro': 'Nº Registro Profissional'
        };
        label.innerText = labels[tipo] || 'Nº Registro Profissional';
    }

    document.getElementById('formCadastroProfissional').onsubmit = async (e) => {
        e.preventDefault();

        const btn = e.target.querySelector('button[type="submit"]');
        btn.disabled = true; btn.innerHTML = 'Processando...';

        document.getElementById('error-banner').classList.add('hidden');
        document.getElementById('success-banner').classList.add('hidden');

        // 3. CORREÇÃO: Trocado "registroProfissional" para "numeroConselho" e adicionado o CPF
        const dados = {
            tipo: document.getElementById('tipoProfissional').value,
            nome: document.getElementById('nome').value,
            registroProfissional: document.getElementById('registro').value,
            especialidade: document.getElementById('especialidade').value,
            valorSessao: document.getElementById('valor').value,
            email: document.getElementById('email').value,
            senha: document.getElementById('password').value
        };

        try {
            const res = await fetch('/api/login/cadastro-profissional', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(dados)
            });

            if (res.ok) {
                document.getElementById('success-banner').classList.remove('hidden');
                document.getElementById('formCadastroProfissional').reset();
                setTimeout(() => window.location.href = '/login', 2500);
            } else {
                const msg = await res.text();

                // 4. CORREÇÃO: Tratamento inteligente do erro em JSON do backend
                try {
                    const jsonErro = JSON.parse(msg);
                    document.getElementById('error-message').innerText = jsonErro.erro || jsonErro.message || "Dados inválidos.";
                } catch(err) {
                    document.getElementById('error-message').innerText = msg || "O e-mail ou conselho já estão em uso.";
                }

                document.getElementById('error-banner').classList.remove('hidden');
                btn.disabled = false; btn.innerHTML = '<span class="material-symbols-outlined text-[20px]">how_to_reg</span> Concluir Registro';
            }
        } catch (error) {
            document.getElementById('error-message').innerText = 'Falha ao conectar com o servidor. O Spring Boot está rodando?';
            document.getElementById('error-banner').classList.remove('hidden');
            btn.disabled = false; btn.innerHTML = '<span class="material-symbols-outlined text-[20px]">how_to_reg</span> Concluir Registro';
        }
    };
</script>
</body>
</html>
