<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>IntegraSaude - Cadastro de Paciente</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet"/>

    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#7543a9", "amethyst": "#925fc7", "secondary": "#846e99",
                        "background": "#fff7fe", "surface": "#ffffff", "surface-container-low": "#faf1fa",
                        "outline-variant": "#cec3d3", "error": "#ba1a1a", "error-container": "#ffdad6",
                        "on-error-container": "#93000a", "success": "#0f5223", "success-container": "#c8e6c9",
                        "on-success-container": "#002107"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-6 relative">

<a href="/cadastro-escolha" class="absolute top-6 left-6 md:top-8 md:left-8 flex items-center gap-2 text-primary font-bold hover:text-amethyst transition-colors">
    <span class="material-symbols-outlined">arrow_back</span> Voltar
</a>

<div class="w-full max-w-5xl bg-surface rounded-xl shadow-[0_12px_32px_rgba(0,0,0,0.08)] overflow-hidden flex flex-col md:flex-row min-h-[650px] border border-outline-variant mt-10 md:mt-0">

    <div class="hidden md:block w-2/5 relative">
        <img class="absolute inset-0 w-full h-full object-cover"
             src="https://images.pexels.com/photos/7176060/pexels-photo-7176060.jpeg" alt="Wellness"/>
        <div class="absolute inset-0 bg-primary/60 backdrop-blur-[2px] flex items-center justify-center p-12 text-white text-center">
            <h2 class="text-2xl font-bold italic">"A jornada para o bem-estar começa com o primeiro passo."</h2>
        </div>
    </div>

    <div class="flex-1 p-8 md:p-12 flex flex-col justify-center overflow-y-auto">
        <div class="flex items-center gap-3 mb-6">
            <span class="material-symbols-outlined text-primary text-4xl">person_add</span>
            <h1 class="text-3xl font-bold text-primary tracking-tight">Conta Paciente</h1>
        </div>

        <div id="success-banner" class="hidden mb-6 p-4 bg-success-container border border-success/20 rounded-md flex items-start gap-3">
            <span class="material-symbols-outlined text-success">check_circle</span>
            <div>
                <p class="text-on-success-container font-bold text-sm">Conta criada!</p>
                <p class="text-on-success-container text-xs mt-1">Seu cadastro foi realizado. Redirecionando para o login...</p>
            </div>
        </div>

        <div id="error-banner" class="hidden mb-6 p-4 bg-error-container border border-error/20 rounded-md flex items-start gap-3">
            <span class="material-symbols-outlined text-error">error</span>
            <div>
                <p class="text-on-error-container font-bold text-sm">Erro no Cadastro</p>
                <p id="error-message" class="text-on-error-container text-xs mt-1"></p>
            </div>
        </div>

        <form id="formCadastro" class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div class="md:col-span-2 space-y-1">
                <label class="text-xs font-bold text-secondary uppercase tracking-wider">Nome Completo</label>
                <input id="nome" type="text" class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-md focus:ring-2 focus:ring-amethyst outline-none" required>
            </div>

            <div class="space-y-1">
                <label class="text-xs font-bold text-secondary uppercase tracking-wider">CPF</label>
                <input id="cpf" type="text" maxlength="14" placeholder="000.000.000-00" oninput="maskCPF(event)" class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-md focus:ring-2 focus:ring-amethyst outline-none" required>
            </div>

            <div class="space-y-1">
                <label class="text-xs font-bold text-secondary uppercase tracking-wider">Data de Nascimento</label>
                <input id="nascimento" type="text" maxlength="10" placeholder="DD/MM/AAAA" oninput="maskDate(event)" class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-md focus:ring-2 focus:ring-amethyst outline-none" required>
            </div>

            <div class="space-y-1">
                <label class="text-xs font-bold text-secondary uppercase tracking-wider">E-mail</label>
                <input id="email" type="email" placeholder="exemplo@email.com" class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-md focus:ring-2 focus:ring-amethyst outline-none" required>
            </div>

            <div class="space-y-1">
                <label class="text-xs font-bold text-secondary uppercase tracking-wider">Telefone</label>
                <input id="telefone" type="text" maxlength="15" placeholder="(00) 00000-0000" oninput="maskPhone(event)" class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-md focus:ring-2 focus:ring-amethyst outline-none" required>
            </div>

            <div class="md:col-span-2 space-y-1">
                <label class="text-xs font-bold text-secondary uppercase tracking-wider">Defina sua Senha</label>
                <input id="password" type="password" placeholder="••••••••" minlength="6" class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-md focus:ring-2 focus:ring-amethyst outline-none" required>
            </div>

            <div class="md:col-span-2 pt-4">
                <button type="submit" class="w-full bg-amethyst text-white py-4 rounded-md font-bold text-lg hover:bg-primary shadow-lg transition-all active:scale-[0.98]">
                    Criar Conta
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // Máscaras para permitir "Copiar e Colar" e manter formatação limpa
    function maskDate(e) {
        let v = e.target.value.replace(/\D/g, ''); // Remove letras
        if (v.length > 2) v = v.substring(0, 2) + '/' + v.substring(2);
        if (v.length > 5) v = v.substring(0, 5) + '/' + v.substring(5, 9);
        e.target.value = v;
    }

    function maskCPF(e) {
        let v = e.target.value.replace(/\D/g, '');
        if (v.length > 3) v = v.substring(0, 3) + '.' + v.substring(3);
        if (v.length > 7) v = v.substring(0, 7) + '.' + v.substring(7);
        if (v.length > 11) v = v.substring(0, 11) + '-' + v.substring(11, 13);
        e.target.value = v;
    }

    function maskPhone(e) {
        let v = e.target.value.replace(/\D/g, '');
        if (v.length > 2) v = '(' + v.substring(0, 2) + ') ' + v.substring(2);
        if (v.length > 9) v = v.substring(0, 10) + '-' + v.substring(10, 14);
        e.target.value = v;
    }

    document.getElementById('formCadastro').onsubmit = async (e) => {
        e.preventDefault();

        const btn = e.target.querySelector('button[type="submit"]');
        btn.disabled = true; btn.innerText = 'Processando...';

        document.getElementById('error-banner').classList.add('hidden');
        document.getElementById('success-banner').classList.add('hidden');

        // Conversão Inteligente: Pega o DD/MM/AAAA e converte para YYYY-MM-DD (Padrão Backend/Banco de Dados)
        const dateParts = document.getElementById('nascimento').value.split('/');
        const dataFormatadaParaBanco = `${dateParts[2]}-${dateParts[1]}-${dateParts[0]}`;

        const dados = {
            nome: document.getElementById('nome').value,
            cpf: document.getElementById('cpf').value,
            dataNascimento: dataFormatadaParaBanco, // Data pronta para o Spring Boot!
            email: document.getElementById('email').value,
            telefone: document.getElementById('telefone').value,
            senha: document.getElementById('password').value
        };

        try {
            const res = await fetch('/api/login/cadastro', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(dados)
            });

            if (res.ok) {
                document.getElementById('success-banner').classList.remove('hidden');
                document.getElementById('formCadastro').reset();
                setTimeout(() => window.location.href = '/login', 2500);
            } else {
                // --- MUDANÇA AQUI ---
                // Em vez de text(), usamos json() porque o nosso Java agora devolve um JSON limpo
                const erroBackend = await res.json();

                // Usamos erroBackend.erro para pegar exatamente a mensagem "Formato de CPF inválido"
                document.getElementById('error-message').innerText = erroBackend.erro || "Verifique os dados informados.";
                document.getElementById('error-banner').classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = 'Criar Conta';
            }
        } catch (error) {
            document.getElementById('error-message').innerText = 'Falha ao conectar com o servidor IntegraSaude.';
            document.getElementById('error-banner').classList.remove('hidden');
            btn.disabled = false;
            btn.innerText = 'Criar Conta';
        }
        }
</script>
</body>
</html>
