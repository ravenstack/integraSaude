<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PsicoAgenda - Recuperar Senha</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="config/tailwind.config.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-5xl grid md:grid-cols-2 bg-surface rounded-xl shadow-[0_12px_32px_rgba(0,0,0,0.08)] overflow-hidden min-h-[600px] border border-outline-variant">

    <div class="hidden md:block relative">
        <img class="absolute inset-0 w-full h-full object-cover" src="/img/fotoB.jpeg" alt="Ambiente Clínico"/>
        <div class="absolute inset-0 bg-primary/60 backdrop-blur-[2px] flex flex-col justify-end p-12 text-white">
            <h2 class="text-3xl font-bold mb-4">Recupere seu Acesso</h2>
            <p class="text-white/90">Gestão clínica com a sofisticação e o cuidado que seus pacientes merecem.</p>
        </div>
    </div>

    <div class="p-8 md:p-16 flex flex-col justify-center relative">
        <div class="absolute top-8 right-8 opacity-10 pointer-events-none">
            <span class="material-symbols-outlined text-primary text-[80px]">spa</span>
        </div>

        <div class="flex items-center gap-2 mb-10 text-primary">
            <img src="/img/logo.png" class="w-10 h-10 object-contain" alt="Logo PsicoAgenda">
            <span class="text-xl font-bold tracking-tight uppercase">PsicoAgenda</span>
        </div>

        <section>
            <h2 class="text-3xl font-bold text-on-surface mb-3 tracking-tight">Esqueceu a senha?</h2>
            <p class="text-on-surface-variant text-sm mb-8 leading-relaxed">
                Não se preocupe. Digite seu e-mail profissional abaixo e enviaremos as instruções de recuperação.
            </p>

            <form class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[12px] font-bold text-secondary uppercase tracking-widest block">
                        E-mail Profissional
                    </label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-4 text-secondary">mail</span>
                        <input type="email" placeholder="exemplo@clinica.com.br"
                               class="w-full pl-12 pr-4 py-4 bg-surface border border-outline-variant rounded-md focus:ring-2 focus:ring-amethyst focus:border-amethyst outline-none transition-all text-on-surface" required>
                    </div>
                </div>

                <button type="submit"
                        class="w-full bg-amethyst text-white py-4 rounded-md font-bold text-lg shadow-lg hover:bg-primary transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
                    Enviar Instruções
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
                </button>
            </form>

            <div class="mt-10 pt-8 border-t border-outline-variant text-center">
                <a href="/login" class="inline-flex items-center gap-2 text-primary font-bold hover:underline group">
                    <span class="material-symbols-outlined text-sm transition-transform group-hover:-translate-x-1">arrow_back</span>
                    Voltar para o Login
                </a>
            </div>
        </section>
    </div>
</div>

</body>
</html>
