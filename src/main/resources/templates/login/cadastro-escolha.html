<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PsicoAgenda - Quem é você?</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="config/tailwind.config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-3xl bg-surface rounded-xl shadow-lg p-12 text-center border border-outline-variant">
    <h1 class="text-3xl font-bold text-primary mb-4">Seja bem-vindo(a)!</h1>
    <p class="text-on-surface-variant mb-12">Selecione o seu perfil para o cadastro clínico:</p>

    <div class="grid md:grid-cols-2 gap-8">
        <a href="/cadastro-profissional" class="flex flex-col items-center p-8 border border-outline-variant rounded-lg hover:border-amethyst hover:bg-surface-container-low transition-all group">
            <span class="material-symbols-outlined text-5xl text-secondary group-hover:text-amethyst mb-4">person</span>
            <h3 class="text-xl font-bold text-on-surface">Sou Profissional</h3>
        </a>
        <a href="/cadastro-paciente" class="flex flex-col items-center p-8 border border-outline-variant rounded-lg hover:border-amethyst hover:bg-surface-container-low transition-all group">
            <span class="material-symbols-outlined text-5xl text-secondary group-hover:text-amethyst mb-4">psychology</span>
            <h3 class="text-xl font-bold text-on-surface">Sou Paciente</h3>
        </a>
    </div>
    <div class="mt-12">
        <a href="/login" class="text-secondary hover:text-primary font-bold flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-sm">arrow_back</span> Voltar
        </a>
    </div>
</div>
</body>
</html>
