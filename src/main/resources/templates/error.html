<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>IntegraSaude - Erro 404</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-primary-fixed to-surface-container-high">
<div class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-surface rounded-2xl shadow-2xl p-lg">
        <div class="text-center">
            <div class="mb-lg">
                <span class="material-symbols-outlined text-6xl text-error" style="font-size: 96px;">error</span>
            </div>
            <h1 class="font-h1 text-on-surface mb-sm">Página não encontrada</h1>
            <p class="font-body-md text-on-surface-variant mb-lg">Desculpe, a página que você está procurando não existe ou foi movida.</p>

            <div class="flex flex-col gap-sm">
                <a href="/" class="bg-primary text-on-primary font-button px-lg py-sm rounded-full hover:opacity-90 transition-all shadow-md block text-center">
                    Voltar ao início
                </a>
                <a href="/login" class="border border-primary text-primary font-button px-lg py-sm rounded-full hover:bg-primary-fixed transition-all text-center">
                    Fazer login
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
<style>
    :root {
        --primary-fixed: #f0dbff;
        --error: #ba1a1a;
        --surface-container-high: #eee5ef;
        --surface: #fff7fe;
        --outline-variant: #cec3d3;
        --on-surface: #1e1a21;
        --on-surface-variant: #4b4451;
        --primary: #7543a9;
        --on-primary: #ffffff;
        --primary-fixed-dim: #eaddff;
        --on-primary-container: #fffbff;
        --primary-container: #8f5cc4;
    }
</style>
</body>
</html>
