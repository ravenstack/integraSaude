<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} + ' | IntegraSaúde'">IntegraSaúde</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <script src="/config/tailwind.config.js"></script>
    <style>
        .skeleton { background-color: #e0d7e0; color: transparent !important; border-radius: 4px; animation: pulse 1.5s infinite ease-in-out; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>

<body>
<aside th:fragment="sidebar" class="w-64 bg-surface-container-low border-r border-outline-variant flex flex-col justify-between hidden md:flex">
    <div>
        <div class="p-lg flex items-center gap-2">
            <span class="material-symbols-outlined text-primary text-3xl">health_and_safety</span>
            <span class="font-bold text-xl text-primary">IntegraSaúde</span>
        </div>
        <nav class="px-md space-y-2 mt-4">
            <a href="/dashboard-paciente" class="flex items-center gap-3 px-4 py-3 bg-primary-fixed text-on-primary-fixed rounded-sm font-button transition-colors"><span class="material-symbols-outlined">home</span>Início</a>
            <a href="/pagamentos-paciente" class="flex items-center gap-3 px-4 py-3 text-secondary hover:bg-surface-container-high rounded-sm font-button transition-colors"><span class="material-symbols-outlined">payments</span>Pagamentos</a>
            <a href="/perfil-paciente" class="flex items-center gap-3 px-4 py-3 text-secondary hover:bg-surface-container-high rounded-sm font-button transition-colors"><span class="material-symbols-outlined">person</span>Perfil</a>
            <a href="/seguranca-paciente" class="flex items-center gap-3 px-4 py-3 text-secondary hover:bg-surface-container-high rounded-sm font-button transition-colors"><span class="material-symbols-outlined">security</span>Segurança</a>
        </nav>
    </div>
    <div class="p-md">
        <button onclick="sair()" class="w-full flex items-center gap-3 px-4 py-3 text-error hover:bg-error-container hover:text-on-error-container rounded-sm font-button transition-colors"><span class="material-symbols-outlined">logout</span>Sair</button>
    </div>
</aside>

<header th:fragment="header(tituloAba)" class="h-20 bg-surface-container-lowest border-b border-outline-variant flex items-center justify-between px-md md:px-lg">
    <h2 class="font-h2 text-2xl text-on-surface font-bold hidden md:block" th:text="${tituloAba}">Meu Painel</h2>
    <div class="md:hidden flex items-center gap-2">
        <span class="material-symbols-outlined text-primary text-2xl">health_and_safety</span>
        <span class="font-bold text-lg text-primary">IntegraSaúde</span>
    </div>
    <div class="flex items-center gap-4">
        <button class="p-2 rounded-full hover:bg-surface-variant text-secondary transition-colors relative"><span class="material-symbols-outlined">notifications</span><span class="absolute top-2 right-2 w-2.5 h-2.5 bg-error rounded-full border-2 border-surface-container-lowest"></span></button>
        <div class="flex items-center gap-3 border-l border-outline-variant pl-4 cursor-pointer hover:opacity-80 transition-opacity">
            <div class="w-10 h-10 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-bold" id="header-avatar">P</div>
            <div class="hidden md:block">
                <p class="text-sm font-bold skeleton" id="header-nome">Carregando...</p>
                <p class="text-xs text-secondary">Paciente</p>
            </div>
            <span class="material-symbols-outlined text-secondary hidden md:block">expand_more</span>
        </div>
    </div>
</header>
</body>
</html>
